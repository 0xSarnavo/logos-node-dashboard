services:
  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: logos-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=0.0.0.0:9090"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - logos-monitor

  # --- Node Exporter (system metrics) ---
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: logos-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.netdev"
      - "--collector.loadavg"
      - "--collector.filesystem"
      - "--collector.filesystem.mount-points-exclude=^/(host/root/)?(dev|proc|sys|run|var/lib/docker/.+)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup.*|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|securityfs|sysfs|tracefs|tmpfs)$$"
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - logos-monitor

  # --- TimescaleDB (blockchain analytics) ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: logos-timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=logos
      - POSTGRES_PASSWORD=${DB_PASSWORD:-logos_internal_db}
      - POSTGRES_DB=logos
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./indexer/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logos"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - logos-monitor

  # --- Indexer (polls node API → TimescaleDB) ---
  indexer:
    build: ./indexer
    container_name: logos-indexer
    restart: unless-stopped
    # Linux needs host.docker.internal mapped explicitly (no-op on Docker Desktop/macOS).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_API=http://host.docker.internal:8080
      - DB_DSN=postgresql://logos:${DB_PASSWORD:-logos_internal_db}@timescaledb:5432/logos
      - POLL_INTERVAL=3
      - NODE_LOG_DIR=/node-logs
      - SIDECAR_API=http://sidecar:8081
    volumes:
      # NODE_DIR = where the logos-node data dir lives on THIS host. Defaults to a
      # sibling ../logos-node; override in .env for any platform (Mac/Pi/WSL/cloud/Linux).
      - ${NODE_DIR:-../logos-node}:/node-logs:ro
    depends_on:
      - timescaledb
      - sidecar
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - logos-monitor

  # --- Sidecar (reads node's RocksDB for block content) ---
  sidecar:
    build: ./sidecar
    container_name: logos-sidecar
    restart: unless-stopped
    environment:
      - DB_PATH=/node-data/state/db
      - SIDECAR_PORT=8081
    volumes:
      - ${NODE_DIR:-../logos-node}/state:/node-data/state:ro
    expose:
      - "8081"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - logos-monitor

  # --- Logos Explorer (custom UI) ---
  explorer:
    build: ./app
    container_name: logos-explorer
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_API=http://host.docker.internal:8080
      - SIDECAR_API=http://sidecar:8081
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=logos
      - DB_USER=logos
      - DB_PASSWORD=${DB_PASSWORD:-logos_internal_db}
      - WALLET_KEYS=${WALLET_KEYS:-}
      # Leader/funding pk(s) of THIS node (comma-separated 64-hex) — powers the
      # "Block Production" panel. Defaults to WALLET_KEYS if unset.
      - NODE_LEADER_KEYS=${NODE_LEADER_KEYS:-}
      # Host metrics source for the "Host Machine (VM)" panel.
      - PROM_URL=${PROM_URL:-http://prometheus:9090}
      - FAUCET_ENABLED=${FAUCET_ENABLED:-true}
      # In-app login — REAL values come from the host .env (gitignored). Never put
      # actual credentials here; this repo is public. Login is disabled unless set.
      - DASH_AUTH_USER=${DASH_AUTH_USER:-admin}
      - DASH_AUTH_PASS=${DASH_AUTH_PASS:-}
      - DASH_AUTH_SECRET=${DASH_AUTH_SECRET:-}
    ports:
      - "127.0.0.1:3333:3333"
    depends_on:
      - timescaledb
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - logos-monitor

  # --- Caddy auth proxy: public HTTPS + basic-auth in front of the explorer ---
  # Reads ./Caddyfile (gitignored — holds your bcrypt hash). See Caddyfile.example.
  caddy:
    image: caddy:2
    container_name: logos-caddy
    restart: unless-stopped
    profiles: ["public"]   # opt-in: only for a public server with a domain. Local
                           # desktops skip it and use http://localhost:3333 directly.
    ports:
      - "80:80"          # Let's Encrypt HTTP-01 challenge + http->https redirect
      - "443:443"        # HTTPS for the DuckDNS domain (auto Let's Encrypt cert)
      - "8443:8443"      # legacy plain-HTTP access (app auth still applies)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - explorer
    networks:
      - logos-monitor

networks:
  logos-monitor:
    driver: bridge
    internal: false

volumes:
  prometheus-data:
  timescale-data:
  caddy-data:
  caddy-config:
