name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  explorer:
    name: Explorer (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  backend:
    name: Indexer + sidecar (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile indexer/indexer.py sidecar/sidecar.py
