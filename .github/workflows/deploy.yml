name: Deploy to VM

# Auto-deploy the dashboard to the Oracle VM on every push to main.
# Requires three repo secrets (Settings -> Secrets and variables -> Actions):
#   VM_HOST    -> the VM public IP (e.g. 80.225.251.221)
#   VM_USER    -> ubuntu
#   VM_SSH_KEY -> the full private key contents (the ~/.ssh/logos-oracle.key file)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/logos-node-dashboard
            # deterministic sync (survives force-pushed history; gitignored .env/Caddyfile are kept)
            git fetch origin main
            git reset --hard origin/main
            NODE_DIR=$HOME/logos-node docker compose up -d --build
            docker image prune -f
